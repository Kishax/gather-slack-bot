version: 1.0
runtime: nodejs18
build:
  commands:
    build:
      - echo "Installing dependencies for production"
      - npm ci --only=production
      - echo "Build completed successfully"
run:
  runtime-version: 18
  command: node index.js
  network:
    port: 3000
    env: PORT
  env:
    - name: NODE_ENV
      value: production
    - name: AWS_REGION
      value: ap-northeast-1
