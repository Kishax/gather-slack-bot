version: 1.0
runtime: nodejs18
build:
  commands:
    # ビルドフェーズの前に依存関係をインストールします
    pre-build:
      - npm install
run:
  # package.jsonのstartスクリプトを実行します
  command: npm start
  network:
    # アプリケーションがリッスンするポート番号
    port: 3000
  env:
    - name: NODE_ENV
      value: production
    - name: AWS_REGION
      value: ap-northeast-1
